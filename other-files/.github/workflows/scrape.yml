# Continuous scraping workflow for Edutu

name: Continuous Scrape

on:
  # Run every 2 hours (10 times per day - free tier limit)
  schedule:
    - cron: '0 */2 * * *'
  
  # Allow manual trigger
  workflow_dispatch:
    inputs:
      maxItems:
        description: 'Max items per source'
        required: false
        default: '10'
        type: string
      sourceId:
        description: 'Specific source ID (optional)'
        required: false
        type: string

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin/backend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd admin/backend
          npm install --production
      
      - name: Run continuous scrape
        env:
          API_URL: ${{ secrets.API_URL }}
          API_KEY: ${{ secrets.API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          MAX_ITEMS: ${{ github.event.inputs.maxItems || '10' }}
        run: |
          response=$(curl -s -X POST "$API_URL/api/scrape/continuous" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"maxItems": '$MAX_ITEMS' }' \
            --max-time 600)
          
          echo "Response: $response"
          
          # Check if scraping was successful
          if echo "$response" | grep -q '"success":true'; then
            echo "✅ Scraping completed successfully"
            echo "$response" | jq '.'
          else
            echo "❌ Scraping failed"
            echo "$response"
            exit 1
          fi
      
      - name: Report success
        if: success()
        run: echo "✅ Continuous scrape job completed successfully"
      
      - name: Report failure
        if: failure()
        run: echo "❌ Continuous scrape job failed"
