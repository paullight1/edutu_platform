name: Continuous Scrape

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *'
  
  # Manual trigger
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Source ID (optional - leave empty for all sources)'
        required: false
        type: string
      max_items:
        description: 'Max items per source'
        required: false
        type: number
        default: 10
      debug:
        description: 'Enable debug mode'
        required: false
        type: boolean
        default: false

env:
  API_URL: ${{ secrets.API_URL }}
  API_KEY: ${{ secrets.API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  scrape:
    name: Run Opportunity Scraper
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install jq (if not available)
        run: |
          if ! command -v jq &> /dev/null; then
            echo "Installing jq..."
            sudo apt-get update && sudo apt-get install -y jq
          fi
          echo "✅ jq available: $(jq --version)"
      
      - name: Check API Health
        id: health-check
        run: |
          echo "Checking API health..."
          response=$(curl -s "$API_URL/health" || echo '{}')
          status=$(echo "$response" | jq -r '.status // "error"')
          
          if [ "$status" = "ok" ] || [ "$status" = "degraded" ]; then
            echo "✅ API is healthy (status: $status)"
            echo "health_status=healthy" >> $GITHUB_OUTPUT
          else
            echo "❌ API health check failed"
            echo "Response: $response"
            echo "health_status=unhealthy" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Get Source Information
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "📋 Manual run triggered by: ${{ github.actor }}"
          echo "📊 Source ID: ${{ github.event.inputs.source_id || 'all' }}"
          echo "📦 Max items: ${{ github.event.inputs.max_items || 10 }}"
      
      - name: Run Continuous Scrape
        id: scrape
        run: |
          echo "🚀 Starting continuous scrape..."
          
          # Build request body
          BODY='{"maxItems": ${{ github.event.inputs.max_items || 10 }}}'
          
          # Add source_id if provided
          if [ -n "${{ github.event.inputs.source_id }}" ]; then
            BODY=$(echo $BODY | jq -s '.[0] + {"sourceId": ${{ github.event.inputs.source_id }}}')
          fi
          
          echo "📤 Request body: $BODY"
          
          # Make the API call
          response=$(curl -s -X POST "$API_URL/api/scrape/continuous" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_KEY" \
            -d "$BODY")
          
          echo "📥 Response: $response"
          
          # Parse results
          scraped=$(echo $response | jq -r '.scraped // 0')
          skipped=$(echo $response | jq -r '.skipped // 0')
          success=$(echo $response | jq -r '.success // false')
          
          echo "scraped=$scraped" >> $GITHUB_OUTPUT
          echo "skipped=$skipped" >> $GITHUB_OUTPUT
          echo "success=$success" >> $GITHUB_OUTPUT
          
          if [ "$success" = "true" ]; then
            echo "✅ Scraping completed successfully"
            echo "scraped_count=$scraped" >> $GITHUB_OUTPUT
            echo "skipped_count=$skipped" >> $GITHUB_OUTPUT
          else
            echo "❌ Scraping failed"
            error_msg=$(echo $response | jq -r '.error // "Unknown error"')
            echo "❌ Error: $error_msg"
            exit 1
          fi
      
      - name: Get Scrape Stats
        if: steps.scrape.outputs.success == 'true'
        run: |
          echo "📊 Getting scrape statistics..."
          
          # Get recent logs
          logs_response=$(curl -s -X GET "$API_URL/api/logs?limit=5" \
            -H "Authorization: Bearer $API_KEY")
          
          echo "📜 Recent logs:"
          echo "$logs_response" | jq '.logs[] | {status, urls_scraped, urls_saved, duration_seconds}'
          
          # Get stats summary
          stats_response=$(curl -s -X GET "$API_URL/api/logs/stats/summary" \
            -H "Authorization: Bearer $API_KEY")
          
          echo "📈 Stats summary:"
          echo "$stats_response" | jq '.summary'
      
      - name: Get Source Status
        if: steps.scrape.outputs.success == 'true'
        run: |
          echo "📡 Checking source status..."
          
          sources_response=$(curl -s -X GET "$API_URL/api/sources" \
            -H "Authorization: Bearer $API_KEY")
          
          echo "🌐 Sources:"
          echo "$sources_response" | jq '.sources[] | {name, enabled, last_scraped, total_scraped}'
      
      - name: Send Success Notification
        if: steps.scrape.outputs.success == 'true' && github.event_name == 'schedule'
        run: |
          echo "📧 Sending success notification..."
          # Optional: Add Slack/Discord webhook notification here
          # Example:
          # curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
          #   -H "Content-Type: application/json" \
          #   -d '{"text": "✅ Scraping completed: ${{ steps.scrape.outputs.scraped }} new opportunities, ${{ steps.scrape.outputs.skipped }} skipped"}'
      
      - name: Send Failure Notification
        if: failure() && github.event_name == 'schedule'
        run: |
          echo "📧 Sending failure notification..."
          # Optional: Add failure notification here
      
      - name: Summary
        if: always()
        run: |
          echo ""
          echo "═══════════════════════════════════════════"
          echo "           SCRAPE SUMMARY"
          echo "═══════════════════════════════════════════"
          echo "Status: ${{ steps.scrape.outputs.success }}"
          echo "Scraped: ${{ steps.scrape.outputs.scraped_count || 0 }}"
          echo "Skipped: ${{ steps.scrape.outputs.skipped_count || 0 }}"
          echo "Time: ${{ github.run_id }}"
          echo "═══════════════════════════════════════════"

  # Optional: Test endpoint for debugging
  test:
    name: Test API Endpoints
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event.inputs.debug == 'true'
    
    steps:
      - name: Test Health Endpoint
        run: |
          echo "Testing health endpoint..."
          curl -s "$API_URL/health" | jq '.'
      
      - name: Test Status Endpoint
        run: |
          echo "Testing status endpoint..."
          curl -s "$API_URL/api/status" | jq '.'
      
      - name: Test Sources Endpoint
        run: |
          echo "Testing sources endpoint..."
          curl -s "$API_URL/api/sources" \
            -H "Authorization: Bearer $API_KEY" | jq '.'
