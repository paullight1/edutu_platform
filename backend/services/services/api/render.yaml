services:
  - type: web
    name: edutu-api
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      # Keep the catalog fresh for paying API customers. The scheduler runs the
      # daily scrape (cron configured in scraper_config); verification re-checks
      # opportunity links and marks broken ones. Both were off — stale data is a
      # refund risk for the paid API.
      - key: SCRAPER_SCHEDULER_ENABLED
        value: "true"
      - key: OPPORTUNITY_VERIFICATION_ENABLED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_KEY_ENCRYPTION_SECRET
        sync: false
      - key: EDUTU_PUBLIC_APP_URL
        value: https://www.edutu.org
      - key: FRONTEND_URL
        value: https://www.edutu.org
      - key: ADMIN_URL
        value: https://admin.edutu.org
      - key: MOBILE_APP_URL
        sync: false
