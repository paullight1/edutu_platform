<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="color-scheme" content="dark light" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#146ef5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Edutu" />
    <meta name="application-name" content="Edutu" />
    <meta name="msapplication-TileColor" content="#146ef5" />
    <meta name="msapplication-TileImage" content="/icons/icon-192x192.png" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- SEO Meta Tags -->
    <title>Edutu | Updated Scholarships, Internships and Grants</title>
    <meta
      name="description"
      content="Browse updated scholarships, internships, fellowships, grants, programs, deadlines, eligibility notes, benefits, and application links on Edutu."
    />
    <meta
      name="keywords"
      content="scholarships, internships, grants, fellowships, student opportunities, application deadlines, Edutu"
    />
    <meta name="author" content="Edutu Team" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://edutu.ai/opportunities" />

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://edutu.ai/opportunities" />
    <meta
      property="og:title"
      content="Edutu | Updated Scholarships, Internships and Grants"
    />
    <meta
      property="og:description"
      content="A focused public index for scholarships, internships, fellowships, grants, deadlines, eligibility notes, benefits, and application links."
    />
    <meta
      property="og:image"
      content="https://edutu.ai/icons/icon-512x512.png"
    />
    <meta property="og:image:alt" content="Edutu logo" />
    <meta property="og:site_name" content="Edutu" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="Edutu | Updated Scholarships, Internships and Grants"
    />
    <meta
      name="twitter:description"
      content="A focused public index for scholarships, internships, fellowships, grants, deadlines, eligibility notes, benefits, and application links."
    />
    <meta
      name="twitter:image"
      content="https://edutu.ai/icons/icon-512x512.png"
    />
    <meta name="twitter:image:alt" content="Edutu logo" />

    <!-- Favicon & Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="/icons/icon-192x192.png"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- PWA Manifest - auto-injected by vite-plugin-pwa -->

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Edutu",
        "url": "https://edutu.ai/opportunities",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Web, iOS, Android",
        "description": "Edutu gives learners a focused index of scholarships, internships, fellowships, grants, deadlines, and application links.",
        "publisher": {
          "@type": "Organization",
          "name": "Edutu",
          "url": "https://edutu.ai/",
          "logo": "https://edutu.ai/icons/icon-512x512.png"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
